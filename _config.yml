# Site Settings
title: V Pro Audio
description: Affordable, professional quality audio for your events.
url: "https://www.vproaudio.rentals"
baseurl: ""
author: "Edwin Vans"
email: "bookings@vproaudio.rentals"
lang: "en"
timezone: "America/Los_Angeles"
branding: "V Pro Audio"

year: 2025
company: "VANS Professional Audio Rentals"

plugins:
  - jekyll-seo-tag
  - jekyll-paginate-v2

seo:
  title: "VANS Pro Audio Rentals"
  description: "Affordable, professional quality audio for your events."
  url: "https://www.vproaudio.rentals"
  image: "/assets/images/home.jpg"

social:
  name: "VANS Pro Audio Rentals"
  links:
    - "https://www.youtube.com/@VProAudioRentals"

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor

sass:
  load_paths:
    - node_modules
  style: compressed

collections:
  faqs:
    output: false
  packages:
    output: true

defaults:
  - scope:
      path: ""
    values:
      layout: "default"
      image: "/assets/images/home.jpg"
      author: "Edwin Vans"
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

# Setup guides pagination
pagination:
  enabled: true
  collection: posts
  category: setup-guides
  per_page: 6
  permalink: /support/setup-guides/page/:num/
